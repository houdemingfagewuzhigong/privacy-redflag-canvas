  </defs>
  <rect x="48" y="278" width="880" height="82" fill="#eef6f5" stroke="#cce3df"/>
  <text x="78" y="326" font-family="Inter,Arial,sans-serif" font-size="19" fill="#0f766e" font-weight="700">No backend required: all analysis runs in the browser for teaching, demos, and privacy-aware workshops.</text>
</svg>
