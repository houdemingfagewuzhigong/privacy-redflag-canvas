<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" role="img" aria-label="Privacy Redflag Canvas architecture">
  <rect width="980" height="420" fill="#f6f8fb"/>
  <text x="48" y="62" font-family="Inter,Arial,sans-serif" font-size="30" font-weight="700" fill="#17202a">Privacy Redflag Canvas Architecture</text>
  <g fill="#fff" stroke="#d9e1ec" stroke-width="2">
    <rect x="48" y="112" width="190" height="110"/>
    <rect x="288" y="112" width="190" height="110"/>
    <rect x="528" y="112" width="190" height="110"/>
    <rect x="768" y="112" width="160" height="110"/>
  </g>
  <g font-family="Inter,Arial,sans-serif" fill="#17202a">
    <text x="78" y="158" font-size="20" font-weight="700">User text</text>
    <text x="78" y="188" font-size="15" fill="#647084">Policy / terms</text>
    <text x="318" y="158" font-size="20" font-weight="700">Rule engine</text>
    <text x="318" y="188" font-size="15" fill="#647084">Risk patterns</text>
    <text x="558" y="158" font-size="20" font-weight="700">Canvas UI</text>
